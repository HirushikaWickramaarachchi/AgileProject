<header class="site-header">
    <nav class="site-navbar" aria-label="Main navigation">
        <div class="navbar-inner">
            <a class="navbar-brand" href="{{ url_for('dashboard.index') }}">
                <span class="navbar-brand-content">
                    <img
                        class="navbar-logo"
                        src="{{ url_for('static', filename='images/uwa-logo.webp') }}"
                        alt="UWA logo"
                    >
                    <span class="navbar-title">ClubSync</span>
                </span>
            </a>

            <button
                class="navbar-toggle"
                type="button"
                aria-label="Toggle navigation"
                aria-expanded="false"
                aria-controls="main-navbar-menu"
            >
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div class="navbar-menu" id="main-navbar-menu">
                <div class="navbar-links">
                    <a
                        href="{{ url_for('clubs.clubs') }}"
                        class="{% if active_page in ['clubs', 'club_details', 'event', 'search'] %}active{% endif %}"
                        {% if active_page in ['clubs', 'club_details', 'event', 'search'] %}aria-current="page"{% endif %}
                    >
                        Clubs
                    </a>

                    {% if session.get('user_id') %}
                        <a
                            href="{{ url_for('clubs.myclubs') }}"
                            class="{% if active_page == 'myclubs' %}active{% endif %}"
                            {% if active_page == 'myclubs' %}aria-current="page"{% endif %}
                        >
                            My Clubs
                        </a>
                        <a
                            href="{{ url_for('profile.profile') }}"
                            class="{% if active_page in ['profile', 'profile_edit'] %}active{% endif %}"
                            {% if active_page in ['profile', 'profile_edit'] %}aria-current="page"{% endif %}
                        >
                            My Profile
                        </a>
                    {% endif %}

                    {% if navbar_can_access_admin %}
                        <a
                            href="{{ url_for('admin.dashboard') if session.get('admin_logged_in') else url_for('admin.login') }}"
                            class="{% if active_page == 'admin' %}active{% endif %}"
                            {% if active_page == 'admin' %}aria-current="page"{% endif %}
                        >
                            Admin
                        </a>
                    {% endif %}
                </div>

                <div class="navbar-tools">
                    <form class="navbar-search" role="search" method="GET" action="{{ url_for('clubs.search') }}">
                        <input
                            type="search"
                            name="q"
                            aria-label="Search clubs and events"
                            placeholder="Search clubs, events, or topics"
                            minlength="2"
                            value="{{ search_query | default('') }}"
                        >
                    </form>

                    <button class="navbar-dark-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
                        <i class="bi bi-moon-stars-fill"></i>
                    </button>

                    <div class="navbar-actions" aria-label="Authentication">
                        {% if session.get('user_id') or session.get('admin_logged_in') %}
                            <a href="{{ url_for('auth.logout') }}">Logout</a>
                        {% else %}
                            <a href="{{ url_for('auth.login') }}">Login</a>
                            <a href="{{ url_for('auth.register') }}">Sign Up</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </div>
    </nav>
</header>
<script>
    (() => {
        const header = document.querySelector(".site-header");
        if (!header) return;
        const toggle = header.querySelector(".navbar-toggle");
        const menu = header.querySelector(".navbar-menu");
        if (!toggle || !menu) return;

        const closeMenu = () => {
            menu.classList.remove("is-open");
            toggle.setAttribute("aria-expanded", "false");
        };

        toggle.addEventListener("click", () => {
            const isOpen = menu.classList.toggle("is-open");
            toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        menu.querySelectorAll("a").forEach((link) => {
            link.addEventListener("click", () => {
                if (window.innerWidth <= 991) {
                    closeMenu();
                }
            });
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth > 991) {
                closeMenu();
            }
        });
    })();
</script>
<script src="{{ url_for('static', filename='js/dark-mode.js') }}"></script>
