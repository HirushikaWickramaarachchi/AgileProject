<!doctype html>
<html lang="en">
  <head>
    <script>if(localStorage.getItem("darkMode")==="true"||localStorage.getItem("adminDarkMode")==="true")document.documentElement.classList.add("dark-mode");</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}?v=2">
    <title>Forgot Password</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/alerts.css') }}"
    />
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dark-mode.css') }}">
</head>

  <body>
    <button class="page-dark-toggle" style="position:fixed;top:16px;right:16px;z-index:999" aria-label="Toggle dark mode" title="Toggle dark mode">
        <i class="bi bi-moon-stars-fill"></i>
    </button>
    {% include "_flash_messages.html" %}

    <div class="container">
      <h2>Reset Password</h2>
      <p>Enter your email and set a new password</p>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="input-group">
          <label>Email</label>
          <input type="email" name="email" required />
        </div>

        <div class="input-group">
          <label>New Password</label>

          <input
            type="password"
            name="password"
            placeholder="Enter new password"
            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"
            title="Password must contain at least 8 characters, one uppercase letter, one lowercase letter, one number and one special character."
            required
          />

          <small class="password-hint">
            Password must contain: 8+ characters, uppercase, lowercase, number,
            and special character.
          </small>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>

          <input
            type="password"
            name="confirmPassword"
            placeholder="Confirm new password"
            required
          />
        </div>

        <button type="submit" class="btn">Reset Password</button>

        <div class="login-link">
          <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </div>
      </form>
    </div>
    <script src="{{ url_for('static', filename='js/dark-mode.js') }}"></script>
</body>
</html>
