<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>

    <link rel="stylesheet" href="../static/css/forgot_password.css" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/alerts.css') }}"
    />
  </head>

  <body>
    {% include "_flash_messages.html" %}

    <div class="container">
      <h2>Reset Password</h2>
      <p>Enter your email and set a new password</p>

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="input-group">
          <label>Email</label>
          <input type="email" name="email" required />
        </div>

        <div class="input-group">
          <label>New Password</label>

          <input
            type="password"
            name="password"
            placeholder="Enter new password"
            pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"
            title="Password must contain at least 8 characters, one uppercase letter, one lowercase letter, one number and one special character."
            required
          />

          <small class="password-hint">
            Password must contain: 8+ characters, uppercase, lowercase, number,
            and special character.
          </small>
        </div>

        <div class="input-group">
          <label>Confirm Password</label>

          <input
            type="password"
            name="confirmPassword"
            placeholder="Confirm new password"
            required
          />
        </div>

        <button type="submit" class="btn">Reset Password</button>

        <div class="login-link">
          <a href="{{ url_for('auth.login') }}">Back to Login</a>
        </div>
      </form>
    </div>
  </body>
</html>
