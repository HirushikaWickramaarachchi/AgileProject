<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/signup.css') }}"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/alerts.css') }}" />
  </head>

  <body>
    {% include "_flash_messages.html" %}

    <div class="signup-page">
      <!-- LEFT SIDE FORM -->
      <div class="signup-left">
        <div class="signup-card">
          <h2>Create Account</h2>
          <p class="subtitle">Join ClubSync and get started</p>

          <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>Full Name</label>
            <input
              type="text"
              name="name"
              placeholder="Enter your name"
              required
            />

            <label>Email</label>
            <input
              type="email"
              name="email"
              placeholder="Enter your email"
              required
            />

            <label>Password</label>
            <input
              type="password"
              name="password"
              placeholder="Enter password"
              required
            />

            <label>Confirm Password</label>
            <input
              type="password"
              name="confirmPassword"
              placeholder="Confirm password"
              required
            />

            <button type="submit">Sign Up</button>
          </form>

          <p class="login-link">
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login</a>
          </p>
        </div>
      </div>

      <!-- RIGHT SIDE IMAGE -->
      <div class="signup-right">
        <div class="overlay-text">
          <h2>Join ClubSync</h2>
          <p>Meet new people, join clubs, and create unforgettable memories.</p>
        </div>
      </div>
    </div>
  </body>
</html>
